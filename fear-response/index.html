<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Fear Response</title>
	<style>
		html, body { margin: 0; height: 100%; }
		body {
			background: #0a0606;
			color: #fff;
			font-family: 'Noto Sans', Arial, sans-serif;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			text-align: center;
		}
		h1 { color: #c8181c; letter-spacing: 2px; }
		a.play {
			display: inline-block;
			margin-top: 1.5rem;
			padding: 0.75rem 2rem;
			background: #c8181c;
			color: #fff;
			text-decoration: none;
			border-radius: 4px;
			font-weight: 700;
		}
		a.play:hover { background: #e02226; }
		.warn {
			margin-top: 2rem;
			color: #888;
			font-size: 0.85rem;
		}
	</style>
</head>
<body>
	<h1>Fear Response</h1>
	<a class="play" href="game/">Play</a>
	<p class="warn">Photosensitivity warning: contains flickering lights.</p>
</body>
</html>
